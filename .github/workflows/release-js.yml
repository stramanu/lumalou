name: Release JS

# Cut a release by pushing a tag like: js-v0.1.0
# Publishes to npm via Trusted Publishing (OIDC) — no token required.
# One-time setup: configure the trusted publisher for the `lumalou` package on npmjs.com
# (Package -> Settings -> Trusted Publisher -> GitHub Actions: stramanu/lumalou, release-js.yml).
on:
  push:
    tags: ["js-v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC identity for npm trusted publishing + provenance
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Update npm (OIDC trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest
      - working-directory: packages/js
        run: |
          npm install
          npm run typecheck
          npm test
          npm run build
          npm publish --access public
